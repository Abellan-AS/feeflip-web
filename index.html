        // Initialize UI Elements
        function selectPlatform(platform) {
            currentPlatform = platform;
            
            // Render active button states
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.className = "platform-btn p-3 text-center text-sm font-semibold rounded-xl border border-slate-200 bg-slate-50 text-slate-700 transition-all dark:border-slate-800 dark:bg-slate-800/50 dark:text-slate-300";
            });
            
            const activeBtn = document.getElementById(`btn-${platform}`);
            if (activeBtn) {
                activeBtn.className = "platform-btn p-3 text-center text-sm font-bold rounded-xl border border-indigo-600 bg-indigo-50 text-indigo-700 dark:border-indigo-500 dark:bg-indigo-950/40 dark:text-indigo-400 ring-2 ring-indigo-500/10";
            }

            const customFields = document.getElementById('custom-fields');
            if (platform === 'custom') {
                customFields.classList.remove('hidden');
            } else {
                customFields.classList.add('hidden');
            }

            updateInfoText();
            calculate();
        }

        function changeLanguage(lang) {
            currentLang = lang;
            
            // Core DOM Translations Mapping
            document.getElementById('txt-title').innerText = dictionary[lang].title;
            document.getElementById('txt-subtitle').innerText = dictionary[lang].subtitle;
            document.getElementById('txt-platform-label').innerText = dictionary[lang].platformLabel;
            document.getElementById('txt-input-label').innerText = dictionary[lang].inputLabel;
            document.getElementById('txt-custom-pct').innerText = dictionary[lang].customPct;
            document.getElementById('txt-custom-fix').innerText = dictionary[lang].customFix;
            document.getElementById('txt-result-label').innerText = dictionary[lang].resultLabel;
            document.getElementById('txt-total-fee').innerText = dictionary[lang].totalFee;

            updateInfoText();
            calculate();
        }

        function updateInfoText() {
            document.getElementById('platform-info').innerText = dictionary[currentLang][`info_${currentPlatform}`];
        }

        function calculate() {
            const netAmount = parseFloat(document.getElementById('netAmount').value);
            
            if (isNaN(netAmount) || netAmount <= 0) {
                document.getElementById('resultListing').innerText = "0.00";
                document.getElementById('resultFee').innerText = "0.00";
                return;
            }

            let percent = 0;
            let fixed = 0;

            if (currentPlatform === 'custom') {
                percent = parseFloat(document.getElementById('customPercent').value) || 0;
                fixed = parseFloat(document.getElementById('customFixed').value) || 0;
            } else {
                percent = platformData[currentPlatform].pct;
                fixed = platformData[currentPlatform].fix;
            }

            // Core Reverse Engineering Formula: Listing Price = (Net + Fixed) / (1 - Percentage)
            const percentDecimal = percent / 100;
            
            if (percentDecimal >= 1) {
                document.getElementById('resultListing').innerText = "Error";
                document.getElementById('resultFee').innerText = "---";
                return;
            }

            const listingPrice = (netAmount + fixed) / (1 - percentDecimal);
            const totalFee = listingPrice - netAmount;

            document.getElementById('resultListing').innerText = listingPrice.toFixed(2);
            document.getElementById('resultFee').innerText = totalFee.toFixed(2);
        }

        // Dark Mode Controller Switch
        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Run Setup Initialization On Window Mount
        window.onload = () => {
            // Check System/Storage Dark Preference
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            // Fire default UI builds
            selectPlatform('ebay');
            changeLanguage('en');
        };
